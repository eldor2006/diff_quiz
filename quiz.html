<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Differensial tenglamalar quiz testi</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --paper: #ffffff;
      --ink: #152033;
      --muted: #667085;
      --line: #d8e0ec;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --primary-soft: #e2f7f4;
      --good: #15803d;
      --good-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --warn: #b7791f;
      --warn-soft: #fef3c7;
      --shadow: 0 20px 50px rgba(21, 32, 51, 0.09);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #e8f6f4 0, var(--bg) 320px);
      line-height: 1.55;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 54px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 780px;
      font-size: 16px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 92px);
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 12px;
      box-shadow: var(--shadow);
      min-height: 78px;
    }

    .stat strong {
      display: block;
      color: var(--primary-dark);
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .quiz-card {
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, var(--primary-soft), #fff);
      display: grid;
      gap: 12px;
    }

    .question-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--primary-dark);
      background: var(--primary-soft);
      font-weight: 700;
    }

    .question {
      margin: 0;
      font-size: 22px;
      line-height: 1.42;
    }

    .answers {
      padding: 20px;
      display: grid;
      gap: 10px;
    }

    .answer {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      color: var(--ink);
      padding: 13px 14px;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .answer:hover:not(:disabled) {
      border-color: var(--primary);
      background: #f2fffd;
      transform: translateY(-1px);
    }

    .answer:disabled {
      cursor: default;
    }

    .letter {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #eef2ff;
      color: #29356b;
      font-weight: 800;
    }

    .answer.correct {
      border-color: var(--good);
      background: var(--good-soft);
    }

    .answer.correct .letter {
      background: var(--good);
      color: white;
    }

    .answer.wrong {
      border-color: var(--bad);
      background: var(--bad-soft);
    }

    .answer.wrong .letter {
      background: var(--bad);
      color: white;
    }

    .feedback {
      min-height: 54px;
      margin: 0 20px 20px;
      border-radius: var(--radius);
      padding: 12px 14px;
      display: none;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    .feedback.show {
      display: block;
    }

    .feedback.good {
      border-color: var(--good);
      background: var(--good-soft);
      color: #14532d;
    }

    .feedback.bad {
      border-color: var(--bad);
      background: var(--bad-soft);
      color: #7f1d1d;
    }

    .actions {
      padding: 0 20px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .left-actions, .right-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: var(--radius);
      min-height: 42px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #e8edf5;
      color: var(--ink);
    }

    .btn.primary {
      color: white;
      background: var(--primary);
    }

    .btn.warn {
      color: #6b3d00;
      background: var(--warn-soft);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .side {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 14px;
    }

    .side-section {
      padding: 16px;
    }

    .side h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.25;
    }

    .progress-wrap {
      height: 12px;
      border-radius: 999px;
      background: #e8edf5;
      overflow: hidden;
      margin: 10px 0 12px;
    }

    .progress {
      width: 0;
      height: 100%;
      background: var(--primary);
      transition: width 0.2s ease;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fbfcfe;
    }

    .mini-stat strong {
      display: block;
      font-size: 20px;
      color: var(--primary-dark);
      line-height: 1;
    }

    .mini-stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .jump-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-height: 340px;
      overflow: auto;
      padding-right: 2px;
    }

    .jump {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 34px;
      background: #fbfcfe;
      cursor: pointer;
      font-weight: 700;
      color: var(--muted);
    }

    .jump.current {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .jump.done.correct {
      border-color: var(--good);
      background: var(--good-soft);
      color: var(--good);
    }

    .jump.done.wrong {
      border-color: var(--bad);
      background: var(--bad-soft);
      color: var(--bad);
    }

    .result {
      display: none;
      padding: 20px;
      margin-top: 18px;
    }

    .result.show {
      display: block;
    }

    .result h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .review {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfcfe;
    }

    .review-item.good {
      border-color: var(--good);
      background: #f2fff6;
    }

    .review-item.bad {
      border-color: var(--bad);
      background: #fff7f7;
    }

    .math {
      font-family: "Cambria Math", "Times New Roman", serif;
      font-size: 1.04em;
    }

    @media (max-width: 900px) {
      .hero, .layout {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 1120px);
      }

      .question {
        font-size: 18px;
      }

      .answer {
        grid-template-columns: 32px 1fr;
        padding: 11px;
      }

      .letter {
        width: 28px;
        height: 28px;
      }

      .jump-grid {
        grid-template-columns: repeat(4, 1fr);
        max-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Differensial tenglamalar quiz testi</h1>
        <p class="lead">Variantlar har safar aralashtiriladi. Javob tanlanganda noto'g'ri bo'lsa ham to'g'ri javob darhol ko'rsatiladi.</p>
      </div>
      <div class="summary">
        <div class="stat"><strong id="totalStat">0</strong><span>savol</span></div>
        <div class="stat"><strong>60</strong><span>boshlanish raqami</span></div>
        <div class="stat"><strong>227</strong><span>oxirgi raqam</span></div>
      </div>
    </section>

    <section class="layout">
      <article class="panel quiz-card">
        <header class="card-head">
          <div class="question-meta">
            <span class="badge" id="questionNumber">60-savol</span>
            <span id="positionText">1 / 1</span>
          </div>
          <h2 class="question math" id="questionText"></h2>
        </header>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback"></div>
        <div class="actions">
          <div class="left-actions">
            <button class="btn" id="prevBtn" type="button">Oldingi</button>
            <button class="btn warn" id="restartBtn" type="button">Qayta boshlash</button>
          </div>
          <div class="right-actions">
            <button class="btn primary" id="nextBtn" type="button">Keyingi</button>
            <button class="btn primary" id="finishBtn" type="button">Natijani ko'rish</button>
          </div>
        </div>
      </article>

      <aside class="side">
        <section class="panel side-section">
          <h2>Natija</h2>
          <div class="progress-wrap"><div class="progress" id="progress"></div></div>
          <div class="score-grid">
            <div class="mini-stat"><strong id="answeredStat">0</strong><span>ishlangan</span></div>
            <div class="mini-stat"><strong id="correctStat">0</strong><span>to'g'ri</span></div>
            <div class="mini-stat"><strong id="wrongStat">0</strong><span>xato</span></div>
            <div class="mini-stat"><strong id="percentStat">0%</strong><span>foiz</span></div>
          </div>
        </section>
        <section class="panel side-section">
          <h2>Savollar</h2>
          <div class="jump-grid" id="jumpGrid"></div>
        </section>
      </aside>
    </section>

    <section class="panel result" id="resultBox">
      <h2>Yakuniy natija</h2>
      <p id="resultText"></p>
      <div class="review" id="review"></div>
    </section>
  </main>

  <script>
    const rawQuestions = String.raw`
60-Savol: y₁ , y₂ va y₃ o'zgarmas koeffitsientli 3-tartibli oddiy differensial tenglamani chiziqli erkli xususiy yechimlari bo'lsa tenglamaning umumiy yechimini ko'rsating.
A) y = c₁y₁ + c₂y₂ + c₃y₃ , c₁ , c₂ , c₃ – o'zgarmas son
B) y = y₁ + c₁(y₂ + y₁) , c₁ – o'zgarmas son;
C) y = c(y₁ + y₂) , c₁ – o'zgarmas son;
D) y = e^(y₁ + y₂)
To‘g‘ri javob: A

61-Savol: Umumiy yechimdan olingan va undagi ixtiyoriy o'zgarmas c ga aniq c = c₀ qiymat berishdan hosil bo'lgan φ(x, c₀) yechimga tenglamaning...
A) Xususiy yechimi deyiladi.
B) Umumiy yechimi deyiladi
C) Karrali yechimi deyiladi
D) Umumiy integrali deyiladi
To‘g‘ri javob: A

62-Savol: x' + g(t)x = f(t)xᵏ , k ≠ 0, k ≠ 1 tenglamani turini aniqlang.
A) Bernulli tenglamasi
B) Chiziqli tenglama
C) O'zgaruvchilari ajraladigan tenglama
D) Klero tenglamasi
To‘g‘ri javob: A

63-Savol: x' + g(t)x = f(t)xᵏ tenglama qachon chiziqli tenglama bo'ladi?
A) k = 0
B) k = 1
C) k = 2
D) k = 3
To‘g‘ri javob: A

64-Savol: n-tartibli differensialli tenglamaning oshkormas ko‘rinishdagi umumiy yechimi qaysi javobda berilgan?
A) φ(x, y, c₁ , ... , cₙ) = 0
B) y = φ(x)
C) φ(x, y) = 0
D) y = y(x)
To‘g‘ri javob: A

65-Savol: Ikkinchi tartibli chiziqli o‘zgarmas koeffitsientli bir jinsli sistemaning xarakteristik sonlari haqiqiy va bir xil ishorali sonlar bo‘lsa, unda (0,0) maxsus nuqta turi qaysi javobda berilgan?
A) Tugun tipdagi nuqta
B) Egarsimon tipdagi nuqta
C) Fokus
D) Markaz
To‘g‘ri javob: A

66-Savol: Ikkinchi tartibli chiziqli o‘zgarmas koeffitsientli bir jinsli sistemaning xarakteristik sonlari haqiqiy har xil ishorali sonlar bo‘lsa, unda (0,0) maxsus nuqta turi qaysi javobda berilgan?
A) Egarsimon tipdagi nuqta
B) Tugun tipdagi nuqta
C) Fokus
D) Markaz
To‘g‘ri javob: A

67-Savol: Ikkinchi tartibli chiziqli o‘zgarmas koeffitsientli bir jinsli sistemaning xarakteristik sonlari kompleks son bo‘lib, uning haqiqiy qismi nolga teng bo‘lib ya’ni sof mavhum son bo‘lsa (0,0) maxsus nuqta turi qaysi javobda berilgan?
A) Markaz tipdagi nuqta
B) Tugun tipdagi nuqta
C) Fokus
D) Egarsimon tipdagi nuqta
To‘g‘ri javob: A

68-Savol: Quyidagi tenglamalarning qaysi biri ikkinchi tartibli differensial tenglama?
A) (d²y / dx²) + sin(x + y) = 0
B) (dy / dx) + sin(x + y²) = 0
C) (d²y / dx²) + cos(x + y''') = 0
D) (d³y / dx³) - sin x² = 0
To‘g‘ri javob: A

69-Savol: y' = f(x + y - 3) ko‘rinishdagi tenglamani yechish uchun qanday almashtirish bajarish kerak?
A) z = x + y - 3
B) z = 2x + f(y) - 3
C) z = xy - 3
D) z = f(xy) - 3
To‘g‘ri javob: A

70-Savol: Differensial tenglamaning integral chizig‘i deb nimaga aytiladi?
A) Differensial tenglama yechimining grafigiga
B) Yechimdan olingan ikkinchi tartibli hosilaning grafigiga
C) Yechimning hosilasining grafigiga
D) Yechimdan olingan integralning grafigiga
To‘g‘ri javob: A

71-Savol: y⁽ⁿ⁾ = f(x, y', ... , y⁽ⁿ⁻¹⁾) tenglama uchun qo‘yilgan boshlang‘ich shart qaysi javobda berilgan?
A) y(x₀) = y₀ , y'(x₀) = y'₀ , ... , y⁽ⁿ⁻¹⁾(x₀) = y₀⁽ⁿ⁻¹⁾
B) y(x₀) = y₀ , y'(x₀) = y'₀ , ... , y⁽ⁿ⁻²⁾(x₀) = y₀⁽ⁿ⁻²⁾
C) y(x₀) = y₀ , y'(x₀) = y'₀ , ... , y⁽ⁿ⁻³⁾(x₀) = y₀⁽ⁿ⁻³⁾
D) y(x₀) = y₀ , y'(x₀) = y'₀ , ... , y⁽ⁿ⁻⁴⁾(x₀) = y₀⁽ⁿ⁻⁴⁾
To‘g‘ri javob: A

72-Savol: Ushbu y''' = xy'' tenglamaning tartibini qaysi almashtirish yordamida pasaytirish mumkin?
A) z = y''
B) z = y
C) z = y'
D) z = y²
To‘g‘ri javob: A

73-Savol: Agar f(x,y) funksiya ∀λ > 0 uchun f(λx, λy) = λᵏ f(x,y) shartni qanoatlantirsa, y' = f(x, y) tenglamaga...
A) k- darajali bir jinsli differensial tenglama deyiladi.
B) k- darajali Bernulli tenglamasi deyiladi.
C) k- darajali bir jinslimas differensial tenglama deyiladi.
D) k- darajali Rikkati tenglamasi deyiladi.
To‘g‘ri javob: A

74-Savol: Rikkati tenglamasining bitta y₁(x) yechimi ma'lum bo'lsa, uning umumiy yechimini topish uchun qanday almashtirish bajarish lozim?
A) y = y₁(x) + u(x)
B) y = y₁(x)u(x)
C) y = y₁²(x) + u(x)
D) y = y₁²(x)u(x)
To‘g‘ri javob: A

75-Savol: Rikkati tenglamasi kvadraturada ... integrallanuvchi degan jumla qaysi javobda noto'g'ri berilgan?
A) bitta hususiy yechim berilganda
B) har doim
C) ikkita hususiy yechim berilganda
D) uchta hususiy yechim berilganda
To‘g‘ri javob: A

76-Savol: Agar oddiy differensial tenglamalar sistemasiga erkli o'zgaruvchi oshkor ravishda kirmasa bunday sistemaga...
A) muxtor sistema deyiladi
B) normal sistema deyiladi
C) maxsus sistema deyiladi
D) oddiy sistema deyiladi
To‘g‘ri javob: A

77-Savol: Agar bir vaqtda nolga teng bo'lmagan shunday α₁, α₂, ... , α_k o'zgarmas sonlar mavjud bo'lsaki, biror I intervalda ushbu α₁φ₁(x) + α₂φ₂(x) + ... + α_k φ_k(x) = 0, ∀x ∈ I tenglik o'rinli bo'lsa, φ₁(x), φ₂(x), ... , φ_k(x) funksiyalar I intervalda...
A) chiziqli bog'liq deyiladi.
B) chiziqli erkli deyiladi.
C) chiziqli bog'lanmagan deyiladi.
D) uzluksiz deyiladi.
To‘g‘ri javob: A

78-Savol: Ushbu M(x,y)dx + N(x,y)dy = 0 differensial tenglama uchun integrallovchi ko'paytuvchi μ(x,y) = μ(x) bo'lsa u holda ...
A) μ(x) = C * exp( ∫_x₀^x ( (∂M/∂y - ∂N/∂x) / N ) dx )
B) μ(x) = C * exp( - ∫_x₀^x ( (∂M/∂y - ∂N/∂x) / N ) dx )
C) μ(x) = C * exp( ∫_x₀^x ( (∂M/∂y - ∂N/∂x) / N ) dx )
D) μ(x) = C * exp( ∫_x₀^x ( (∂M/∂y + ∂N/∂x) / N ) dx )
To‘g‘ri javob: A

79-Savol: Ushbu M(x,y)dx + N(x,y)dy = 0 differensial tenglama uchun integrallovchi ko'paytuvchi μ(x,y) = μ(y) bo'lsa u holda ...
A) μ(y) = C * exp( ∫_y₀^y ( (∂N/∂x - ∂M/∂y) / M ) dy )
B) μ(y) = C * exp( - ∫_y₀^y ( (∂N/∂x - ∂M/∂y) / M ) dy )
C) μ(y) = C * exp( ∫_y₀^y ( (∂N/∂x - ∂M/∂y) / N ) dy )
D) μ(y) = C * exp( ∫_x₀^x ( (∂N/∂x - ∂M/∂y) / N ) dx )
To‘g‘ri javob: A

80-Savol: Ushbu y' = f(ax + by + c) differensial tenglamada z = ax + by + c almashtirish bajarilsa, u qanday ko'rinishga keladi?
A) z' = a + b * f(z)
B) yz' = a + b * f(z)
C) xz' = a + b * f(z)
D) yz' = ax + b * f(z)
To‘g‘ri javob: A

81-Savol: Agar f(x,y) funksiya uchun f(λ^α x, λ^β y) = λ^(α-β) f(x,y), ∀λ > 0 shart bajarilsa, y' = f(x, y) tenglamaga...
A) kvazi bir jinsli differensial tenglama deyiladi.
B) bir jinslimas differensial tenglama deyiladi.
C) Bernulli differensial tenglamasi deyiladi.
D) o'zgaruvchilari ajraladigan differensial tenglama deyiladi.
To‘g‘ri javob: A

82-Savol: Ushbu y' = Ay² + Bx^α , A ≠ 0, B ≠ 0 Rikkati tenglamasi kvadraturada integrallanuvchi bo'ladi, agarda...
A) α / (2α + 4) soni butun bo'lsa
B) 1 / (α + 4) soni butun bo'lsa
C) 1 / (2α - 4) soni butun bo'lsa
D) α / (2α + 4) soni musbat bo'lsa
To‘g‘ri javob: A

83-Savol: Chiziqli bir jinsli dy/dx = p(x)y + q(x) differensial tenglamaning integrallovchi ko'paytuvchisini ko'rinishini aniqlang?
A) μ(x) = exp{ - ∫ p(x)dx }
B) μ(x) = exp{ ∫ p(x)dx }
C) μ(x) = exp{ x + ∫ p(x)dx }
D) μ(x) = exp{ 2x + ∫ p(x)dx }
To‘g‘ri javob: A

84-Savol: Agar f(x,y) funksiya P sohaning har bir nuqtasida f'_y(x,y) xususiy hosilaga ega bo‘lib, |f'_y(x,y)| ≤ C, C = const bo‘lsa, u holda bu funksiya P to‘g‘ri to‘rtburchakda...

`;

    const allRaw = [rawQuestions, extraQuestions, tailQuestions, moreQuestions, finalQuestions].join("\n");

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function prettyMath(text) {
      let html = escapeHtml(text.trim());
      html = html.replace(/\*/g, "·");
      html = html.replace(/\be\^\(([^()]+)\)/g, "e<sup>$1</sup>");
      html = html.replace(/\ba\^\(([^()]+)\)/g, "a<sup>$1</sup>");
      html = html.replace(/\b([xyλ])\^\(([^()]+)\)/g, "$1<sup>$2</sup>");
      html = html.replace(/\b([axy])\^(-?[A-Za-z0-9αβ]+)\b/g, "$1<sup>$2</sup>");
      html = html.replace(/exp\(([^)]+)\)/g, "e<sup>$1</sup>");
      html = html.replace(/\bdx\b/g, "dx").replace(/\bdy\b/g, "dy");
      return html;
    }

    function parseQuestions(raw) {
      return raw.trim().split(/\n\s*\n(?=\d+-Savol:)/).map(block => {
        const numberMatch = block.match(/^(\d+)-Savol:\s*([\s\S]*?)(?=\nA\))/);
        const answerMatch = block.match(/To‘g‘ri javob:\s*([ABCD])/);
        const optionMatches = [...block.matchAll(/\n([ABCD])\)\s*([\s\S]*?)(?=\n[ABCD]\)|\nTo‘g‘ri javob:|$)/g)];
        if (!numberMatch || !answerMatch || optionMatches.length < 4) return null;
        const correctLetter = answerMatch[1];
        const options = optionMatches.map(match => ({
          originalLetter: match[1],
          text: match[2].trim(),
          correct: match[1] === correctLetter
        }));
        return {
          number: Number(numberMatch[1]),
          question: numberMatch[2].trim(),
          options,
          selected: null,
          locked: false,
          shuffled: shuffle(options)
        };
      }).filter(Boolean).sort((a, b) => a.number - b.number);
    }

    function shuffle(items) {
      const arr = items.map(item => ({ ...item }));
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const questions = parseQuestions(allRaw);
    let current = 0;

    const questionNumber = document.getElementById("questionNumber");
    const positionText = document.getElementById("positionText");
    const questionText = document.getElementById("questionText");
    const answers = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");
    const restartBtn = document.getElementById("restartBtn");
    const totalStat = document.getElementById("totalStat");
    const answeredStat = document.getElementById("answeredStat");
    const correctStat = document.getElementById("correctStat");
    const wrongStat = document.getElementById("wrongStat");
    const percentStat = document.getElementById("percentStat");
    const progress = document.getElementById("progress");
    const jumpGrid = document.getElementById("jumpGrid");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");
    const review = document.getElementById("review");

    function render() {
      const q = questions[current];
      questionNumber.textContent = `${q.number}-savol`;
      positionText.textContent = `${current + 1} / ${questions.length}`;
      questionText.innerHTML = prettyMath(q.question);
      answers.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "";

      q.shuffled.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer";
        btn.disabled = q.locked;
        btn.innerHTML = `<span class="letter">${String.fromCharCode(65 + index)}</span><span class="math">${prettyMath(option.text)}</span>`;
        if (q.locked) {
          if (option.correct) btn.classList.add("correct");
          if (q.selected === option.text && !option.correct) btn.classList.add("wrong");
        }
        btn.addEventListener("click", () => selectAnswer(option));
        answers.appendChild(btn);
      });

      if (q.locked) showFeedback(q);
      prevBtn.disabled = current === 0;
      nextBtn.textContent = current === questions.length - 1 ? "Oxirgi savol" : "Keyingi";
      nextBtn.disabled = current === questions.length - 1;
      updateStats();
      renderJumps();
    }

    function selectAnswer(option) {
      const q = questions[current];
      if (q.locked) return;
      q.selected = option.text;
      q.locked = true;
      render();
    }

    function showFeedback(q) {
      const correct = q.options.find(option => option.correct);
      const selected = q.options.find(option => option.text === q.selected);
      const isCorrect = selected && selected.correct;
      feedback.className = `feedback show ${isCorrect ? "good" : "bad"}`;
      feedback.innerHTML = isCorrect
        ? `<strong>To'g'ri.</strong> Javob: <span class="math">${prettyMath(correct.text)}</span>`
        : `<strong>Xato.</strong> To'g'ri javob: <span class="math">${prettyMath(correct.text)}</span>`;
    }

    function updateStats() {
      const answered = questions.filter(q => q.locked).length;
      const correct = questions.filter(q => q.locked && q.options.find(o => o.text === q.selected)?.correct).length;
      const wrong = answered - correct;
      const percent = answered ? Math.round((correct / answered) * 100) : 0;
      totalStat.textContent = questions.length;
      answeredStat.textContent = answered;
      correctStat.textContent = correct;
      wrongStat.textContent = wrong;
      percentStat.textContent = `${percent}%`;
      progress.style.width = `${Math.round((answered / questions.length) * 100)}%`;
    }

    function renderJumps() {
      jumpGrid.innerHTML = "";
      questions.forEach((q, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "jump";
        btn.textContent = q.number;
        if (index === current) btn.classList.add("current");
        if (q.locked) {
          btn.classList.add("done");
          const isCorrect = q.options.find(o => o.text === q.selected)?.correct;
          btn.classList.add(isCorrect ? "correct" : "wrong");
        }
        btn.addEventListener("click", () => {
          current = index;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        jumpGrid.appendChild(btn);
      });
    }

    function finishQuiz() {
      const answered = questions.filter(q => q.locked).length;
      const correct = questions.filter(q => q.locked && q.options.find(o => o.text === q.selected)?.correct).length;
      const wrong = answered - correct;
      const percent = questions.length ? Math.round((correct / questions.length) * 100) : 0;
      resultBox.classList.add("show");
      resultText.innerHTML = `Jami <strong>${questions.length}</strong> ta savoldan <strong>${answered}</strong> tasi ishlandi. To'g'ri: <strong>${correct}</strong>, xato: <strong>${wrong}</strong>. Umumiy foiz: <strong>${percent}%</strong>.`;
      review.innerHTML = "";
      questions.filter(q => q.locked && !q.options.find(o => o.text === q.selected)?.correct).forEach(q => {
        const correctOption = q.options.find(o => o.correct);
        const item = document.createElement("div");
        item.className = "review-item bad";
        item.innerHTML = `<strong>${q.number}-savol</strong><br><span class="math">${prettyMath(q.question)}</span><br><br>To'g'ri javob: <strong class="math">${prettyMath(correctOption.text)}</strong>`;
        review.appendChild(item);
      });
      resultBox.scrollIntoView({ behavior: "smooth" });
    }

    function restartQuiz() {
      questions.forEach(q => {
        q.selected = null;
        q.locked = false;
        q.shuffled = shuffle(q.options);
      });
      current = 0;
      resultBox.classList.remove("show");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    prevBtn.addEventListener("click", () => {
      if (current > 0) current--;
      render();
    });

    nextBtn.addEventListener("click", () => {
      if (current < questions.length - 1) current++;
      render();
    });

    finishBtn.addEventListener("click", finishQuiz);
    restartBtn.addEventListener("click", restartQuiz);

    render();
  </script>
